<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAIOVEGA</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;

            background-image:
                linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.55)),
                url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070&auto=format&fit=crop");

            background-size: cover;
            background-position: center;

            display: flex;
            justify-content: center;
            align-items: center;

            font-family: Arial, sans-serif;
            color: white;

            overflow: hidden;
        }

        .container {
            text-align: center;
            backdrop-filter: blur(2px);
        }

        .logo {
            width: 180px;
            margin-bottom: 30px;
        }

        .brand {
            font-size: 6rem;
            font-weight: bold;
            letter-spacing: 4px;
            margin-bottom: 20px;
        }

        .tagline {
            font-size: 1.2rem;
            letter-spacing: 8px;
            opacity: 0.8;
            margin-bottom: 60px;
        }

        .coming {
            font-size: 1rem;
            letter-spacing: 10px;
            opacity: 0.7;
        }

        @media(max-width: 768px){

            .logo{
                width:120px;
            }

            .brand{
                font-size:3rem;
            }

            .tagline{
                font-size:0.9rem;
                letter-spacing:4px;
            }

            .coming{
                font-size:0.8rem;
                letter-spacing:6px;
            }

        }

    </style>

</head>

<body>

    <div class="container">

        <img class="logo"
        src="https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg"
        alt="">

        <div class="brand">
            NAIOVEGA
        </div>

        <div class="tagline">
            RENDERED TO EXIST
        </div>

        <div class="coming">
            COMING SOON
        </div>

    </div>

</body>

</html>
